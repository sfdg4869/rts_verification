<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows кІҪлЎң н…ҢмҠӨнҠё</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .form-group { margin: 10px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        .info { background: #e2e3e5; border-color: #d6d8db; }
        .path-examples { background: #f8f9fa; padding: 15px; border-radius: 4px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>sec_logging.json мғқм„ұ н…ҢмҠӨнҠё</h1>
        
        <div class="path-examples">
            <h3>рҹ’Ў Windows кІҪлЎң мһ…л Ҙ л°©лІ•</h3>
            <p><strong>л°©лІ• 1 (к¶ҢмһҘ):</strong> <code>C:/Users/jungkyungsoo/Desktop/jks/OJT_2</code></p>
            <p><strong>л°©лІ• 2:</strong> <code>C:\\Users\\jungkyungsoo\\Desktop\\jks\\OJT_2</code></p>
            <p><strong>мЈјмқҳ:</strong> лӢЁмқј л°ұмҠ¬лһҳмӢң(\)лҠ” JSONм—җм„ң мқҙмҠӨмјҖмқҙн”„ л¬ёмһҗлЎң мІҳлҰ¬лҗҳм–ҙ мҳӨлҘҳк°Җ л°ңмғқн•©лӢҲлӢӨ.</p>
        </div>

        <form id="testForm">
            <div class="form-group">
                <label for="dg_home_dir">кІҪлЎң (dg_home_dir):</label>
                <input type="text" id="dg_home_dir" name="dg_home_dir" 
                       value="C:/Users/jungkyungsoo/Desktop/jks/OJT_2" 
                       placeholder="C:/path/to/directory">
            </div>

            <div class="form-group">
                <label for="db_id">Database ID:</label>
                <input type="number" id="db_id" name="db_id" value="2">
            </div>

            <div class="form-group">
                <label for="local_only">
                    <input type="checkbox" id="local_only" name="local_only" checked>
                    лЎңм»¬м—җл§Ң нҢҢмқј мғқм„ұ (SSH мӮ¬мҡ© м•Ҳн•Ё)
                </label>
            </div>

            <div class="form-group">
                <label for="ssh_host">SSH Host:</label>
                <input type="text" id="ssh_host" name="ssh_host" value="10.20.132.40">
            </div>

            <div class="form-group">
                <label for="ssh_port">SSH Port:</label>
                <input type="number" id="ssh_port" name="ssh_port" value="22" placeholder="22">
            </div>

            <div class="form-group">
                <label for="ssh_user">SSH User:</label>
                <input type="text" id="ssh_user" name="ssh_user" value="jungkyungsoo">
            </div>

            <div class="form-group">
                <label for="ssh_password">SSH Password:</label>
                <input type="password" id="ssh_password" name="ssh_password" value="!977255Ks">
            </div>

            <button type="button" onclick="testPath()">кІҪлЎң мң нҡЁм„ұ кІҖмӮ¬</button>
            <button type="button" onclick="testSSH()">SSH м—°кІ° н…ҢмҠӨнҠё</button>
            <button type="button" onclick="previewJson()">JSON лҜёлҰ¬ліҙкё°</button>
            <button type="button" onclick="createJson()">JSON нҢҢмқј мғқм„ұ</button>
        </form>

        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/repo';

        function showResult(message, type = 'info') {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.innerHTML = message;
            resultDiv.style.display = 'block';
        }

        function getFormData() {
            const localOnly = document.getElementById('local_only').checked;
            const data = {
                dg_home_dir: document.getElementById('dg_home_dir').value,
                db_id: parseInt(document.getElementById('db_id').value),
                local_only: localOnly
            };
            
            // SSH м •ліҙлҠ” local_onlyк°Җ falseмқј л•Ңл§Ң нҸ¬н•Ё
            if (!localOnly) {
                data.ssh_host = document.getElementById('ssh_host').value;
                data.ssh_port = parseInt(document.getElementById('ssh_port').value) || 22;
                data.ssh_user = document.getElementById('ssh_user').value;
                data.ssh_password = document.getElementById('ssh_password').value;
            }
            
            return data;
        }

        function testPath() {
            const data = getFormData();
            const originalPath = data.dg_home_dir;
            
            let message = '<h4>рҹ”Қ кІҪлЎң мң нҡЁм„ұ кІҖмӮ¬</h4>';
            message += `<p><strong>мӣҗліё кІҪлЎң:</strong> ${originalPath}</p>`;
            
            // JSON м§Ғл ¬нҷ” н…ҢмҠӨнҠё
            try {
                const jsonStr = JSON.stringify(data, null, 2);
                const parsed = JSON.parse(jsonStr);
                
                message += `<p><strong>JSON м§Ғл ¬нҷ”:</strong> вң… м„ұкіө</p>`;
                message += `<p><strong>нҢҢмӢұлҗң кІҪлЎң:</strong> ${parsed.dg_home_dir}</p>`;
                
                // м •к·ңнҷ”лҗң кІҪлЎң
                const normalized = originalPath.replace(/\\\\/g, '/');
                message += `<p><strong>м •к·ңнҷ”лҗң кІҪлЎң:</strong> ${normalized}</p>`;
                
                message += '<h5>рҹ“Ӣ JSON нҺҳмқҙлЎңл“ң:</h5>';
                message += `<pre>${jsonStr}</pre>`;
                
                showResult(message, 'success');
            } catch (e) {
                message += `<p><strong>JSON м§Ғл ¬нҷ”:</strong> вқҢ мӢӨнҢЁ</p>`;
                message += `<p><strong>мҳӨлҘҳ:</strong> ${e.message}</p>`;
                showResult(message, 'error');
            }
        }

        async function testSSH() {
            const data = getFormData();
            const sshData = {
                ssh_host: data.ssh_host,
                ssh_port: data.ssh_port,
                ssh_user: data.ssh_user,
                ssh_password: data.ssh_password
            };
            
            try {
                showResult('рҹ”„ SSH м—°кІ° н…ҢмҠӨнҠё мӨ‘...', 'info');
                
                const response = await fetch(`${API_BASE}/test_ssh_connection`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(sshData)
                });

                const result = await response.json();
                
                if (response.ok) {
                    let message = '<h4>вң… SSH м—°кІ° м„ұкіө</h4>';
                    message += `<p><strong>нҳёмҠӨнҠё:</strong> ${result.ssh_host}:${result.ssh_port}</p>`;
                    message += `<p><strong>м—°кІ° мӢңк°„:</strong> ${result.connection_time}</p>`;
                    message += `<p><strong>н…ҢмҠӨнҠё кІ°кіј:</strong> ${result.test_output}</p>`;
                    showResult(message, 'success');
                } else {
                    let message = '<h4>вқҢ SSH м—°кІ° мӢӨнҢЁ</h4>';
                    message += `<p><strong>мҳӨлҘҳ:</strong> ${result.error}</p>`;
                    message += `<p><strong>м ңм•Ҳ:</strong> ${result.suggestion}</p>`;
                    showResult(message, 'error');
                }
            } catch (e) {
                showResult(`вқҢ мҡ”мІӯ мҳӨлҘҳ: ${e.message}`, 'error');
            }
        }

        async function previewJson() {
            const data = { db_id: getFormData().db_id };
            
            try {
                showResult('рҹ”„ лҜёлҰ¬ліҙкё° мҡ”мІӯ мӨ‘...', 'info');
                
                const response = await fetch(`${API_BASE}/preview_sec_logging_json`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (response.ok) {
                    let message = '<h4>вң… JSON лҜёлҰ¬ліҙкё° м„ұкіө</h4>';
                    message += `<p><strong>Stat к°ңмҲҳ:</strong> ${result.stat_details?.length || 0}</p>`;
                    message += `<p><strong>Wait к°ңмҲҳ:</strong> ${result.wait_details?.length || 0}</p>`;
                    message += '<h5>рҹ“Ӣ мғқм„ұлҗ  JSON кө¬мЎ°:</h5>';
                    message += `<pre>${JSON.stringify(result.preview, null, 2)}</pre>`;
                    showResult(message, 'success');
                } else {
                    showResult(`вқҢ лҜёлҰ¬ліҙкё° мӢӨнҢЁ: ${result.error}`, 'error');
                }
            } catch (e) {
                showResult(`вқҢ мҡ”мІӯ мҳӨлҘҳ: ${e.message}`, 'error');
            }
        }

        async function createJson() {
            const data = getFormData();
            
            try {
                showResult('рҹ”„ JSON нҢҢмқј мғқм„ұ мӨ‘...', 'info');
                
                const response = await fetch(`${API_BASE}/create_sec_logging_json`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (response.ok) {
                    let message = '<h4>вң… JSON нҢҢмқј мғқм„ұ м„ұкіө</h4>';
                    message += `<p><strong>кІ°кіј:</strong> ${result.result}</p>`;
                    message += `<p><strong>нҢҢмқј кІҪлЎң:</strong> ${result.file_path}</p>`;
                    message += `<p><strong>мғқм„ұ л°©мӢқ:</strong> ${result.local_only ? 'лЎңм»¬ мғқм„ұ' : 'SSH мӣҗкІ© мғқм„ұ'}</p>`;
                    
                    if (!result.local_only) {
                        message += `<p><strong>SSH нҳёмҠӨнҠё:</strong> ${result.ssh_host}:${result.ssh_port}</p>`;
                    }
                    
                    message += `<p><strong>Stat к°ңмҲҳ:</strong> ${result.stat_count}</p>`;
                    message += `<p><strong>Wait к°ңмҲҳ:</strong> ${result.wait_count}</p>`;
                    showResult(message, 'success');
                } else {
                    showResult(`вқҢ мғқм„ұ мӢӨнҢЁ: ${result.error}`, 'error');
                }
            } catch (e) {
                showResult(`вқҢ мҡ”мІӯ мҳӨлҘҳ: ${e.message}`, 'error');
            }
        }

        // нҺҳмқҙм§Җ лЎңл“ң мӢң мһҗлҸҷ кІҪлЎң н…ҢмҠӨнҠё
        window.onload = function() {
            testPath();
        };
    </script>
</body>
</html>
