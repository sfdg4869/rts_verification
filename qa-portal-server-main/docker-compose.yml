services:
  web:
    image: ${QA_PORTAL_IMAGE:?Set QA_PORTAL_IMAGE in .env or the shell before deploy}
    pull_policy: always
    container_name: qa-portal-server
    ports:
      - "${APP_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      MONGODB_URI: ${MONGODB_URI:-}
    volumes:
      - ./db_setup.json:/app/db_setup.json:ro
      - ./db_config.json:/app/db_config.json:ro
      - ./app/resource:/app/app/resource
    restart: unless-stopped
